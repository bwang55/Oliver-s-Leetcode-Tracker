version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            # cwd persists across commands AND across phases in Amplify Hosting CI.
            # Anchor every command at $CODEBUILD_SRC_DIR (CodeBuild's auto-injected
            # repo-root env var) so prior phases' cd's don't break us.
            #
            # `npm install` (not `npm ci`) — Amplify CDK packages ship bundled
            # deps that npm ci's strict validator rejects with "Missing:
            # fast-xml-parser@... from lock file". install relaxes that check.
            - cd $CODEBUILD_SRC_DIR/frontend && npm install
        build:
          commands:
            - cd $CODEBUILD_SRC_DIR/frontend && npm run build
      artifacts:
        baseDirectory: frontend/dist
        files:
          - '**/*'
      cache:
        paths:
          - frontend/node_modules/**/*
    backend:
      phases:
        build:
          commands:
            # The Gen 2 backend (`amplify/`) and its CLI dep
            # (`@aws-amplify/backend-cli`) live at repo root. Plus we need the
            # `backend/` package's deps (AWS SDK, openai, jose, @types/node)
            # for Lambda bundling and the TS validation step inside
            # `pipeline-deploy`.
            #
            # Anchor at $CODEBUILD_SRC_DIR for the same reason as the frontend
            # phase: cwd persists, don't trust it.
            #
            # All chained with `&&` in one shell so `npx ampx` sees the bins
            # the just-completed npm install put on PATH.
            #
            # `--outputs-out-dir frontend/src` writes amplify_outputs.json
            # directly where the frontend imports from (locally this is a
            # gitignored symlink, but CI doesn't have it).
            - cd $CODEBUILD_SRC_DIR && npm install && (cd backend && npm install) && (cd amplify && npm install) && npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID --outputs-out-dir frontend/src
