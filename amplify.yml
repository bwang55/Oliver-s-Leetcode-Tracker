version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            # Frontend phase starts at repo root in CI (empirical). Cwd persists
            # from preBuild → build within the same phase, so the `cd frontend`
            # here means `npm run build` below already runs from frontend/.
            #
            # `npm install` (not `npm ci`) — Amplify CDK packages ship bundled
            # deps that npm ci's strict validator rejects with "Missing:
            # fast-xml-parser@... from lock file". install relaxes that check.
            - cd frontend && npm install
        build:
          commands:
            # cwd is already frontend/ from preBuild — DO NOT `cd frontend` again,
            # that would attempt frontend/frontend which doesn't exist.
            - npm run build
      artifacts:
        # baseDirectory is relative to appRoot, so `dist` here resolves to
        # frontend/dist from repo root. Don't write `frontend/dist` — Amplify
        # would prepend appRoot again and look for frontend/frontend/dist.
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    backend:
      phases:
        build:
          commands:
            # Backend phase starts at <repo-root>/frontend/ (because of
            # appRoot: frontend). `cd ..` to repo root where amplify/ lives.
            #
            # Three installs needed:
            #   - root deps    → CDK + Amplify CLI (`ampx` binary)
            #   - backend/     → AWS SDK / openai / jose / @types — for Lambda
            #                    bundling and TS validation inside pipeline-deploy
            #   - amplify/     → tiny resource shim package
            #
            # All chained in one shell so npx ampx sees the bins on PATH.
            #
            # `npm install` not `npm ci` — same Amplify-CDK bundled-deps issue.
            #
            # `--outputs-out-dir frontend/src` writes amplify_outputs.json
            # straight where the frontend imports from (locally a gitignored
            # symlink, but CI doesn't have it).
            - cd .. && npm install && (cd backend && npm install) && (cd amplify && npm install) && npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID --outputs-out-dir frontend/src
