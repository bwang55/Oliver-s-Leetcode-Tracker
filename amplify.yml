version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            # `appRoot: frontend` pins cwd to frontend/, so paths here are
            # relative to that — not to the repo root.
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    backend:
      phases:
        build:
          commands:
            # `appRoot: frontend` pins cwd to frontend/ for every phase, but the
            # Gen 2 backend (`amplify/`) and its CLI dep (`@aws-amplify/backend-cli`)
            # live at repo root. Hop up before installing + invoking ampx.
            - cd .. && npm ci
            # Write `amplify_outputs.json` straight into the path the frontend
            # imports from (locally this is a gitignored symlink to project root;
            # CI doesn't have that symlink, so we point ampx there directly).
            - cd .. && npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID --outputs-out-dir frontend/src
