version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - cd frontend && npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: frontend/dist
        files:
          - '**/*'
      cache:
        paths:
          - frontend/node_modules/**/*
    backend:
      phases:
        build:
          commands:
            - npm ci
            # Write `amplify_outputs.json` straight into the path the frontend
            # imports from (locally this is a gitignored symlink to project root;
            # CI doesn't have that symlink, so we point ampx there directly).
            - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID --outputs-out-dir frontend/src
