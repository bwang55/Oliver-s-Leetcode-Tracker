version: 1
applications:
  - appRoot: frontend
    frontend:
      phases:
        preBuild:
          commands:
            # `appRoot: frontend` pins cwd to frontend/, so paths here are
            # relative to that — not to the repo root.
            #
            # `npm install` (not `npm ci`) — same Amplify-CDK bundled-deps
            # issue as the backend phase: CI's npm rejects perfectly valid
            # lockfiles with "Missing: fast-xml-parser@... from lock file".
            # install relaxes that strict check while still honoring lockfile
            # versions.
            - npm install
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
    backend:
      phases:
        build:
          commands:
            # `appRoot: frontend` pins cwd to frontend/ for every phase, but the
            # Gen 2 backend (`amplify/`) and its CLI dep (`@aws-amplify/backend-cli`)
            # live at repo root. Two notes:
            #
            # 1. Keep install + ampx invocation in a SINGLE command. Amplify
            #    Hosting runs each list item as a fresh shell, and `npx ampx`
            #    sometimes fails to see the freshly-installed bin from a prior
            #    shell. Chaining with `&&` is the simplest way to guarantee the
            #    same shell sees both the install and the bin.
            #
            # 2. `npm install` (not `npm ci`) — Amplify CDK packages ship bundled
            #    deps that npm ci's strict validator rejects ("Missing:
            #    fast-xml-parser@... from lock file") even after a clean
            #    regenerate. install relaxes that check while still honoring the
            #    lockfile's pinned versions.
            #
            # `--outputs-out-dir frontend/src` writes `amplify_outputs.json`
            # straight into the path the frontend imports from (locally this is
            # a gitignored symlink to project root; CI doesn't have that
            # symlink, so we point ampx there directly).
            # Three installs in one shell:
            #   - root deps    → CDK / Amplify CLI for `ampx`
            #   - backend deps → AWS SDK / openai / jose / @types — needed at
            #                    bundle time AND for the TS validation step
            #                    that runs inside `pipeline-deploy`
            #   - amplify deps → the resource shim package (small)
            - cd .. && npm install && (cd backend && npm install) && (cd amplify && npm install) && npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID --outputs-out-dir frontend/src
